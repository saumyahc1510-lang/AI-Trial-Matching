# Alembic configuration file for the AI Clinical Trial Matching system.

[alembic]
# Path to the migration environment directory.
script_location = alembic

# Template used for new migration file names.
# Produces: 2026_05_26_1430-abc123def456_add_users_table.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Ensure the backend directory is on sys.path so `app.*` imports resolve.
prepend_sys_path = .

# Timezone to use for file_template rendering (default: local).
# timezone =

# Max length of characters to apply to the "slug" field.
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# to be detected as revisions in the versions/ directory.
# sourceless = false

# Version-number behaviour — "new" generates UUIDs.
# version_num_scheme = new

# Database URL.
# Prefer reading from the environment (see env.py) but provide a fallback.
sqlalchemy.url = postgresql://postgres:yourpassword@localhost:5432/trial_matching

[post_write_hooks]
# Uncomment to run code formatters after generating a migration:
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

# ── Logging ───────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
