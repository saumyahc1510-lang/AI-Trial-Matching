[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Where to find the app package when pytest is invoked from the backend/ root.
pythonpath = .

# Quieter output by default; ``-v`` from the CLI overrides.
addopts =
    -ra
    --strict-markers
    --tb=short

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
